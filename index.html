<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ledger — Expense & Budget Visualizer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="app">

  <header class="app-header">
    <p class="eyebrow">Daily ledger</p>
    <h1>Expense &amp; Budget Visualizer</h1>
  </header>

  <!-- Signature element: receipt-style balance tape -->
  <section class="balance-tape" aria-label="Total balance">
    <div class="tape-row">
      <span class="tape-label">Total balance</span>
      <span class="tape-date" id="todayDate"></span>
    </div>
    <div class="tape-amount" id="totalBalance">$0.00</div>
    <div class="tape-perforation" aria-hidden="true"></div>
  </section>

  <main class="grid">

    <!-- Left column -->
    <section class="col-left">

      <div class="card">
        <h2>Add transaction</h2>
        <form id="transactionForm" novalidate>
          <div class="field">
            <label for="itemName">Item name</label>
            <input type="text" id="itemName" placeholder="e.g. Coffee" autocomplete="off">
          </div>

          <div class="field-row">
            <div class="field">
              <label for="amount">Amount</label>
              <input type="number" id="amount" placeholder="0.00" step="0.01" min="0" inputmode="decimal">
            </div>
            <div class="field">
              <label for="category">Category</label>
              <select id="category">
                <option value="Food">Food</option>
                <option value="Transport">Transport</option>
                <option value="Fun">Fun</option>
              </select>
            </div>
          </div>

          <div class="field" id="customCategoryField" hidden>
            <label for="customCategoryInput">New category name</label>
            <input type="text" id="customCategoryInput" placeholder="e.g. Health">
          </div>

          <button type="button" class="link-btn" id="addCategoryBtn">+ Add custom category</button>

          <p class="form-error" id="formError" role="alert"></p>

          <button type="submit" class="btn-primary">Add transaction</button>
        </form>
      </div>

      <div class="card">
        <div class="list-header">
          <h2>Transactions</h2>
          <div class="sort-control">
            <label for="sortSelect">Sort</label>
            <select id="sortSelect">
              <option value="newest">Newest first</option>
              <option value="amount-desc">Amount: high to low</option>
              <option value="amount-asc">Amount: low to high</option>
              <option value="category">Category</option>
            </select>
          </div>
        </div>

        <div class="field limit-field">
          <label for="limitInput">Flag transactions over</label>
          <input type="number" id="limitInput" placeholder="No limit set" step="0.01" min="0">
        </div>

        <ul class="transaction-list" id="transactionList">
          <li class="empty-state" id="emptyState">No transactions yet — add your first one above.</li>
        </ul>
      </div>

    </section>

    <!-- Right column -->
    <section class="col-right">
      <div class="card chart-card">
        <h2>Spending by category</h2>
        <div class="chart-wrap">
          <canvas id="categoryChart" role="img" aria-label="Pie chart of spending by category"></canvas>
          <p class="chart-empty" id="chartEmpty">Nothing to chart yet.</p>
        </div>
        <ul class="legend" id="chartLegend"></ul>
      </div>
    </section>

  </main>

  <footer class="app-footer">
    <p>Stored locally on this device. Nothing leaves your browser.</p>
  </footer>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<script src="js/script.js"></script>
</body>
</html>
